<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>车辆价格查询</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;background:#f5f6fa;min-height:100vh}
.header{background:linear-gradient(135deg,#1565C0,#0D47A1);padding:14px 16px 12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.header h1{color:#fff;font-size:18px;font-weight:600;text-align:center;margin-bottom:10px;letter-spacing:1px}
.search-bar{display:flex;gap:8px;align-items:center}
.search-box{flex:1;background:#fff;border-radius:20px;display:flex;align-items:center;padding:0 14px;height:38px}
.search-box input{flex:1;border:none;outline:none;font-size:15px;color:#333;background:transparent}
.search-box input::placeholder{color:#aaa}
.clear-btn{width:20px;height:20px;background:#ccc;border-radius:50%;display:none;align-items:center;justify-content:center;font-size:12px;color:#fff;cursor:pointer;flex-shrink:0}
.search-btn{background:#FF9800;color:#fff;border:none;border-radius:20px;padding:0 16px;height:38px;font-size:15px;font-weight:600;cursor:pointer;white-space:nowrap}
.stat-bar{padding:10px 16px;font-size:13px;color:#666;background:#fff;border-bottom:1px solid #eee}
.list-wrap{padding:10px 12px 20px}
.card{background:#fff;border-radius:12px;margin-bottom:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card-header{display:flex;justify-content:space-between;align-items:center;padding:12px 14px 8px;border-bottom:1px solid #f0f0f0}
.car-series{font-size:15px;font-weight:700;color:#1565C0;flex:1}
.car-brand{font-size:11px;padding:2px 8px;border-radius:10px;color:#fff;font-weight:600;flex-shrink:0;margin-left:8px}
.tag-腾势{background:#1565C0}.tag-比亚迪{background:#FF9800}.tag-方程豹{background:#4CAF50}
.card-model{padding:6px 14px 8px;font-size:14px;color:#444;font-weight:500}
.card-body{padding:8px 14px 10px}
.price-row{display:flex;gap:12px;margin-bottom:6px}
.price-item{flex:1}
.price-label{font-size:11px;color:#999;display:block;margin-bottom:2px}
.price-val{font-size:15px;font-weight:700}
.price-val.guide{color:#999;text-decoration:line-through}
.price-val.sell{color:#E53935}
.price-val.discount{color:#FF9800}
.price-val.extra{color:#4CAF50}
.gift-row{background:#FFF8E1;border-radius:6px;padding:6px 10px;margin-top:6px;font-size:12px;color:#F57F17;display:flex;gap:4px}
.gift-val{color:#E65100}
.card-footer{padding:8px 14px;background:#fafafa;font-size:11px;color:#999;border-top:1px solid #f0f0f0}
.empty-tip{text-align:center;padding:60px 0;color:#bbb;font-size:16px}
.footer{text-align:center;padding:20px;font-size:12px;color:#bbb}
</style>
</head>

<div class="header">
  <h1>🚗 车辆价格查询</h1>
  <div class="search-bar">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="搜索车系/车型/品牌..." oninput="onInput()">
      <div class="clear-btn" id="clearBtn" onclick="clearSearch()">✕</div>
    </div>
    <button class="search-btn" onclick="doSearch()">查询</button>
  </div>
</div>
<div class="stat-bar" id="statBar">加载中...</div>
<div class="list-wrap" id="listWrap"><div class="empty-tip">正在加载...</div></div>
<div class="footer">数据来源：广州大区 / 佛山 / 粤海 / 方程豹</div>

var allData = [];
function fmtPrice(v){
  if(v===null||v===undefined||v===''||v===false)return '-';
  var n=parseInt(v);if(isNaN(n))return '-';
  return '¥'+n.toLocaleString('zh-CN');
}
function enrichData(raw){
  return raw.map(function(item){
    var o=Object.assign({},item);
    o._guide=fmtPrice(item['指导价']);
    o._sell=fmtPrice(item['销售价']);
    var d=item['备案优惠(不含超级置换)'];
    o._discount=(d&&d!=='-'&&d!=='')?fmtPrice(d):'';
    o._showDiscount=!!(o._discount&&o._discount!=='-');
    var s=item['超级置换'];
    o._super=(s&&s!=='-'&&s!=='')?fmtPrice(s):'';
    o._showSuper=!!(o._super&&o._super!=='-');
    var g=item['保养赠送'];
    o._showGift=!!(g&&g!=='-'&&g!=='');
    o._giftText=o._showGift?g:'';
    return o;
  });
}
function renderList(list){
  var w=document.getElementById('listWrap');
  if(!list||list.length===0){w.innerHTML='<div class="empty-tip">😅 未找到匹配车型</div>';return}
  w.innerHTML=list.map(function(item){
    var h='<div class="card"><div class="card-header"><span class="car-series">'+esc(item['车系全名']||item['车系']||'')+'</span><span class="car-brand tag-'+esc(item['品牌']||'')+'">'+esc(item['品牌']||'')+'</span></div>';
    h+='<div class="card-model">'+esc(item['车型名称']||'')+'</div><div class="card-body">';
    h+='<div class="price-row"><div class="price-item"><span class="price-label">指导价</span><span class="price-val guide">'+item._guide+'</span></div><div class="price-item"><span class="price-label">销售价</span><span class="price-val sell">'+item._sell+'</span></div></div>';
    if(item._showDiscount)h+='<div class="price-row"><div class="price-item"><span class="price-label">备案优惠</span><span class="price-val discount">'+item._discount+'</span></div></div>';
    if(item._showSuper)h+='<div class="price-row"><div class="price-item"><span class="price-label">超级置换</span><span class="price-val extra">'+item._super+'</span></div></div>';
    if(item._showGift)h+='<div class="gift-row"><span>🎁 赠送：</span><span class="gift-val">'+esc(item._giftText)+'</span></div>';
    h+='</div><div class="card-footer">📋 '+(item['来源']||'')+'</div></div>';
    return h;
  }).join('');
}
function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
function doSearch(){
  var kw=document.getElementById('searchInput').value.trim();
  document.getElementById('clearBtn').style.display=kw?'flex':'none';
  if(!kw){
    document.getElementById('statBar').textContent='共收录 '+allData.length+' 条车型数据';
    renderList(allData);return;
  }
  var kws=kw.toLowerCase().split(/\s+/).filter(function(k){return k});
  var r=allData.filter(function(item){
    var t=[item['车系全名']||'',item['车型名称']||'',item['品牌']||'',item['来源']||'',item['车系']||''].join(' ').toLowerCase();
    return kws.every(function(k){return t.indexOf(k)>=0});
  });
  document.getElementById('statBar').textContent='找到 '+r.length+' 条结果';
  renderList(r);
}
function onInput(){doSearch()}
function clearSearch(){
  document.getElementById('searchInput').value='';
  document.getElementById('clearBtn').style.display='none';
  document.getElementById('statBar').textContent='共收录 '+allData.length+' 条车型数据';
  renderList(allData);
}
