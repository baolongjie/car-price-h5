<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>🚗 宇翔专用·车价查询</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;background:#f5f6fa;min-height:100vh}
.header{background:linear-gradient(135deg,#2E7D32,#1B5E20);padding:14px 16px 12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.header h1{color:#fff;font-size:18px;font-weight:600;text-align:center;margin-bottom:10px;letter-spacing:1px}
.header .sub{color:rgba(255,255,255,.7);font-size:11px;text-align:center}
.search-bar{display:flex;gap:8px;align-items:center}
.search-box{flex:1;background:#fff;border-radius:20px;display:flex;align-items:center;padding:0 14px;height:38px}
.search-box input{flex:1;border:none;outline:none;font-size:15px;color:#333;background:transparent}
.search-box input::placeholder{color:#aaa}
.clear-btn{width:20px;height:20px;background:#ccc;border-radius:50%;display:none;align-items:center;justify-content:center;font-size:12px;color:#fff;cursor:pointer;flex-shrink:0}
.search-btn{background:#FF9800;color:#fff;border:none;border-radius:20px;padding:0 16px;height:38px;font-size:15px;font-weight:600;cursor:pointer;white-space:nowrap}
.brand-tabs{display:flex;gap:6px;padding:8px 12px;overflow-x:auto;-webkit-overflow-scrolling:touch;background:#fff;border-bottom:1px solid #eee;position:sticky;top:60px;z-index:99}
.brand-tabs::-webkit-scrollbar{display:none}
.brand-tab{flex-shrink:0;padding:6px 14px;border-radius:16px;font-size:13px;font-weight:600;color:#555;background:#f0f0f0;border:none;cursor:pointer;transition:all .2s;white-space:nowrap}
.brand-tab.active{background:#2E7D32;color:#fff;box-shadow:0 2px 6px rgba(46,125,50,.3)}
.brand-tab:hover:not(.active){background:#e0e0e0}
.brand-tab[data-brand="全部"].active{background:#4CAF50;color:#fff}
.brand-tab[data-brand="王朝"].active{background:#E65100;color:#fff}
.brand-tab[data-brand="海洋"].active{background:#0277BD;color:#fff}
.brand-tab[data-brand="腾势"].active{background:#1565C0;color:#fff}
.brand-tab[data-brand="方程豹"].active{background:#4CAF50;color:#fff}
.stat-bar{padding:10px 16px;font-size:13px;color:#666;background:#fff;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center}
.stat-bar .refresh-info{font-size:11px;color:#999}
.stat-bar .refresh-btn{background:none;border:1px solid #ddd;color:#666;padding:2px 10px;border-radius:10px;font-size:11px;cursor:pointer}
.stat-bar .refresh-btn:active{background:#eee}
.stat-bar .loading-dot{display:inline-block;width:6px;height:6px;background:#2E7D32;border-radius:50%;animation:blink 1s infinite;margin-right:4px;vertical-align:middle}
@keyframes blink{50%{opacity:.3}}
.list-wrap{padding:10px 12px 20px}
.card{background:#fff;border-radius:12px;margin-bottom:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);transition:transform .15s}
.card:active{transform:scale(.98)}
.card-header{display:flex;justify-content:space-between;align-items:center;padding:12px 14px 8px;border-bottom:1px solid #f0f0f0}
.car-series{font-size:15px;font-weight:700;color:#2E7D32;flex:1}
.car-brand{font-size:11px;padding:2px 8px;border-radius:10px;color:#fff;font-weight:600;flex-shrink:0;margin-left:8px}
.tag-腾势{background:#1565C0}.tag-比亚迪{background:#FF9800}.tag-方程豹{background:#4CAF50}.tag-王朝{background:#E65100}.tag-海洋{background:#0277BD}
.card-model{padding:6px 14px 8px;font-size:14px;color:#444;font-weight:500}
.card-body{padding:8px 14px 10px}
.price-row{display:flex;gap:12px;margin-bottom:6px}
.price-item{flex:1}
.price-label{font-size:11px;color:#999;display:block;margin-bottom:2px}
.price-val{font-size:15px;font-weight:700}
.price-val.guide{color:#333}
.price-val.sell{color:#E53935}
.price-val.discount{color:#FF9800}
.price-val.extra{color:#4CAF50}

.gift-row{background:#E8F5E9;border-radius:6px;padding:6px 10px;margin-top:6px;font-size:12px;color:#2E7D50;display:flex;gap:4px}
.gift-val{color:#1B5E20}
.card-footer{padding:8px 14px;background:#fafafa;font-size:11px;color:#999;border-top:1px solid #f0f0f0}
.empty-tip{text-align:center;padding:60px 0;color:#bbb;font-size:16px}
.loading-tip{text-align:center;padding:60px 0;color:#999;font-size:15px}
.loading-tip .spinner{display:inline-block;width:30px;height:30px;border:3px solid #eee;border-top-color:#2E7D32;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.footer{text-align:center;padding:20px;font-size:12px;color:#bbb}
/* 品牌首页 */
.brand-home{padding:20px 16px;text-align:center}
.brand-home h2{font-size:20px;color:#333;margin-bottom:6px}
.brand-home p{font-size:13px;color:#888;margin-bottom:24px}
.brand-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;max-width:400px;margin:0 auto}
.brand-card{background:#fff;border-radius:16px;padding:24px 16px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.08);cursor:pointer;transition:all .2s;border:2px solid transparent}
.brand-card:active{transform:scale(.95)}
.brand-card .brand-icon{font-size:40px;margin-bottom:8px}
.brand-card .brand-name{font-size:17px;font-weight:700;color:#333}

.yx-badge{display:inline-block;font-size:10px;padding:1px 6px;border-radius:8px;background:#E8F5E9;color:#2E7D32;font-weight:600;margin-left:4px;vertical-align:middle}

<body>

<div class="header">

  <div class="sub">王朝销售价以广宣价为准 · 数据来源佛山大区备案表</div>
  <div class="search-bar">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="搜索车系/车型..." oninput="onInput()">
      <div class="clear-btn" id="clearBtn" onclick="clearSearch()">✕</div>

    <button class="search-btn" onclick="doSearch()">查询</button>

</div>

<div class="brand-tabs" id="brandTabs">

// 查找广宣价
function getGxPrice(series, model){
  // 精确匹配
  var k = series+'|'+model;
  if(GX_MAP[k] !== undefined) return GX_MAP[k];
  // 模糊匹配：只用车系名的一部分
  for(var key in GX_MAP){
    if(key.indexOf('|') > 0){
      var parts = key.split('|');
      if((series.indexOf(parts[0]) >= 0 || parts[0].indexOf(series) >= 0) && model === parts[1]){
        return GX_MAP[key];
      }
    }
  }
  return null;
}

// ============================================================
//  工具函数
// ============================================================
function fmtPrice(v){
  if(v===null||v===undefined||v===''||v===false)return '-';
  var n=parseInt(v);
  if(isNaN(n))return v;
  return '¥'+n.toLocaleString('zh-CN');
}

function esc(s){
  var d=document.createElement('div');
  d.textContent=s||'';
  return d.innerHTML;
}

function enrichData(raw){
  return raw.map(function(item){
    var o=Object.assign({},item);
    o._guide=fmtPrice(item['指导价']);
    
    // 核心逻辑：如果是王朝品牌，用广宣价覆盖销售价
    var brand = item['品牌'] || '';
    var series = item['车系'] || '';
    var model = item['车型名称'] || item['车型'] || '';
    var gxPrice = null;
    
    if(brand === '王朝'){
      gxPrice = getGxPrice(series, model);
      if(gxPrice !== null && gxPrice !== undefined){
        o._sell = fmtPrice(gxPrice);
        o._yxPrice = gxPrice;  // 原始数字
        o._isYxPrice = true;   // 标记为广宣价
      } else {
        o._sell = fmtPrice(item['销售价']);
        o._isYxPrice = false;
      }
    } else {
      o._sell = fmtPrice(item['销售价']);
      o._isYxPrice = false;
    }

    var d=item['备案优惠(不含超级置换)'];
    o._discount=(d&&d!=='-'&&d!=='')?fmtPrice(d):'';
    o._showDiscount=!!(o._discount&&o._discount!=='-');
    var s=item['超级置换'];
    o._super=(s&&s!=='-'&&s!=='')?fmtPrice(s):'';
    o._showSuper=!!(o._super&&o._super!=='-');
    var g=item['保养赠送'];
    o._showGift=!!(g&&g!=='-'&&g!=='');
    o._giftText=o._showGift?g:'';
    return o;
  });
}

// ============================================================
//  品牌
// ============================================================
function getBrands(data){
  var map={};
  for(var i=0;i<data.length;i++){
    var b=data[i]['品牌']||'其他';
    if(!map[b])map[b]=[];
    map[b].push(data[i]);
  }
  return map;
}

function renderBrandHome(data){
  var brands=getBrands(data);
  var total=data.length;
  var html='<div class="brand-home">';
  html+='<h2>🚗 宇翔专用·选择品牌</h2>';
  html+='<p>共收录 '+total+' 条车型 <span style="color:#2E7D32">（王朝以广宣价为销售价）</span></p>';
  html+='<div class="brand-grid">';
  html+='<div class="brand-card all" onclick="selectBrand(\'全部\')"><div class="brand-icon">📋</div><div class="brand-name">全部品牌</div><div class="brand-count">'+total+' 条车型</div></div>';
  var brandIcons={'王朝':'🏯','海洋':'🌊','腾势':'🚙','方程豹':'🐆'};
  var brandKeys=['王朝','海洋','腾势','方程豹'];
  for(var i=0;i<brandKeys.length;i++){
    var b=brandKeys[i];
    var count=(brands[b]||[]).length;
    html+='<div class="brand-card '+b.toLowerCase()+'" onclick="selectBrand(\''+esc(b)+'\')"><div class="brand-icon">'+(brandIcons[b]||'🚗')+'</div><div class="brand-name">'+esc(b)+'</div><div class="brand-count">'+count+' 条车型'+(b==='王朝'?' ⭐':'')+'</div></div>';
  }
  html+='</div></div>';
  document.getElementById('listWrap').innerHTML=html;
}

// ============================================================
//  列表渲染
// ============================================================
function renderList(list){
  var w=document.getElementById('listWrap');
  if(!list||list.length===0){
    w.innerHTML='<div class="empty-tip">😅 未找到匹配车型</div>';
    return;
  }
  w.innerHTML=list.map(function(item){
    var h='<div class="card">';
    h+='<div class="card-header">';
    h+='<span class="car-series">'+esc(item['车系全名']||item['车系']||'')+'</span>';
    h+='<span class="car-brand tag-'+esc(item['品牌']||'')+'">'+esc(item['品牌']||'')+'</span>';
    h+='</div>';
    h+='<div class="card-model">'+esc(item['车型名称']||'')+'</div>';
    h+='<div class="card-body">';
    h+='<div class="price-row">';
    h+='<div class="price-item"><span class="price-label">指导价</span><span class="price-val guide">'+item._guide+'</span></div>';
    // 销售价 - 宇翔专用样式
    var sellClass = item._isYxPrice ? 'yx-sell' : 'sell';
    var sellBadge = item._isYxPrice ? '<span class="yx-badge">广宣价</span>' : '';
    h+='<div class="price-item"><span class="price-label">销售价'+sellBadge+'</span><span class="price-val '+sellClass+'">'+item._sell+'</span></div>';
    h+='</div>';
    if(item._showDiscount)h+='<div class="price-row"><div class="price-item"><span class="price-label">备案优惠</span><span class="price-val discount">'+item._discount+'</span></div></div>';
    if(item._showSuper)h+='<div class="price-row"><div class="price-item"><span class="price-label">超级置换</span><span class="price-val extra">'+item._super+'</span></div></div>';
    if(item._showGift)h+='<div class="gift-row"><span>🎁 赠送：</span><span class="gift-val">'+esc(item._giftText)+'</span></div>';
    h+='</div>';
    h+='<div class="card-footer">📋 '+(item['来源']||'')+(item._isYxPrice ? ' &nbsp;|&nbsp; 💰 宇翔广宣价' : '')+'</div>';
    h+='</div>';
    return h;
  }).join('');
}

// ============================================================
//  品牌筛选
// ============================================================
function selectBrand(brand){
  currentBrand=brand;
  var tabs=document.querySelectorAll('.brand-tab');
  for(var i=0;i<tabs.length;i++){
    tabs[i].classList.toggle('active', tabs[i].getAttribute('data-brand')===brand);
  }
  document.getElementById('searchInput').value='';
  document.getElementById('clearBtn').style.display='none';

  if(brand==='全部'){
    var order={'王朝':0,'海洋':1,'腾势':2,'方程豹':3};
    var sorted=allData.slice().sort(function(a,b){
      var oa=order[a['品牌']]!==undefined?order[a['品牌']]:99;
      var ob=order[b['品牌']]!==undefined?order[b['品牌']]:99;
      return oa-ob;
    });
    updateStat(sorted.length);
    renderList(sorted);
  }else{
    var filtered=allData.filter(function(d){return (d['品牌']||'')===brand});
    updateStat(filtered.length, brand);
    renderList(filtered);
  }
}

// ============================================================
//  搜索
// ============================================================
function doSearch(){
  var kw=document.getElementById('searchInput').value.trim();
  document.getElementById('clearBtn').style.display=kw?'flex':'none';
  var baseData=currentBrand==='全部'?allData:allData.filter(function(d){return (d['品牌']||'')===currentBrand});
  if(!kw){
    updateStat(baseData.length, currentBrand);
    renderList(baseData);
    return;
  }
  var kws=kw.toLowerCase().split(/\s+/).filter(function(k){return k});
  var r=baseData.filter(function(item){
    var t=[item['车系全名']||'',item['车型名称']||'',item['品牌']||'',item['来源']||'',item['车系']||''].join(' ').toLowerCase();
    return kws.every(function(k){return t.indexOf(k)>=0});
  });
  updateStat(r.length, currentBrand, kw);
  renderList(r);
}

function onInput(){doSearch()}

function clearSearch(){
  document.getElementById('searchInput').value='';
  document.getElementById('clearBtn').style.display='none';
  selectBrand(currentBrand);
}

// ============================================================
//  状态栏
// ============================================================
function updateStat(count, brand, keyword){
  var txt='';
  if(keyword)txt='找到 '+count+' 条结果';
  else if(brand&&brand!=='全部')txt=brand+' · '+count+' 条';
  else txt='共收录 '+count+' 条车型数据';
  if(lastUpdateTime)txt+=' &nbsp;|&nbsp; '+lastUpdateTime;
  document.getElementById('statText').innerHTML=txt;
}

// ============================================================
//  数据加载
// ============================================================
function loadCloudData(){
  var stat=document.getElementById('statText');
  var wrap=document.getElementById('listWrap');
  stat.innerHTML='<span class="loading-dot"></span>正在从云端加载...';
  wrap.innerHTML='<div class="loading-tip"><div class="spinner"></div><br>正在从云端加载数据...</div>';

  fetch(DATA_URL, {cache:'no-cache', headers:{'Accept':'application/json'}})
    .then(function(res){
      if(!res.ok)throw new Error('HTTP '+res.status);
      return res.json();
    })
    .then(function(json){
      if(!json||!Array.isArray(json)||json.length===0){
        throw new Error('数据为空');
      }
      allData=enrichData(json);

      // 统计广宣价覆盖数
      var yxCount = allData.filter(function(d){return d._isYxPrice}).length;

      var now=new Date();
      lastUpdateTime=(now.getMonth()+1)+'/'+now.getDate()+ ' '+now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');

      selectBrand(currentBrand);
    })
    .catch(function(err){
      console.error('[加载失败]', err);
      stat.innerHTML='⚠️ 加载失败，点击刷新重试';
      wrap.innerHTML='<div class="empty-tip">😅 数据加载失败<br><br><span style="font-size:13px;color:#999">'+esc(err.message)+'</span><br><br><button onclick="loadCloudData()" style="padding:8px 24px;background:#2E7D32;color:#fff;border:none;border-radius:20px;font-size:14px;cursor:pointer">重新加载</button></div>';
    });
}

// ============================================================
//  初始化
// ============================================================
loadGxMap();  // 先加载广宣价映射
loadCloudData();

setInterval(loadCloudData, 30*60*1000);
</script>
