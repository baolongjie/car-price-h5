<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>🚗 宇翔专用·车价查询</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;background:#f5f6fa;min-height:100vh}
.header{background:linear-gradient(135deg,#2E7D32,#1B5E20);padding:14px 16px 10px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.header h1{color:#fff;font-size:18px;font-weight:600;text-align:center;letter-spacing:1px}
.header .sub{color:rgba(255,255,255,.75);font-size:11px;text-align:center;margin-top:4px}
.search-bar{display:flex;gap:8px;align-items:center;margin-top:10px}
.search-box{flex:1;background:#fff;border-radius:20px;display:flex;align-items:center;padding:0 14px;height:38px}
.search-box input{flex:1;border:none;outline:none;font-size:15px;color:#333;background:transparent}
.search-box input::placeholder{color:#aaa}
.clear-btn{width:20px;height:20px;background:#ccc;border-radius:50%;display:none;align-items:center;justify-content:center;font-size:12px;color:#fff;cursor:pointer;flex-shrink:0}
.search-btn{background:#FF9800;color:#fff;border:none;border-radius:20px;padding:0 16px;height:38px;font-size:15px;font-weight:600;cursor:pointer}
.brand-tabs{display:flex;gap:6px;padding:8px 12px;overflow-x:auto;-webkit-overflow-scrolling:touch;background:#fff;border-bottom:1px solid #eee;position:sticky;top:56px;z-index:99}
.brand-tabs::-webkit-scrollbar{display:none}
.brand-tab{flex-shrink:0;padding:6px 14px;border-radius:16px;font-size:13px;font-weight:600;color:#555;background:#f0f0f0;border:none;cursor:pointer;transition:all .2s;white-space:nowrap}
.brand-tab.active{box-shadow:0 2px 6px rgba(0,0,0,.15)}
.brand-tab[data-brand="全部"].active{background:#4CAF50;color:#fff}
.brand-tab[data-brand="王朝"].active{background:#E65100;color:#fff}
.brand-tab[data-brand="海洋"].active{background:#0277BD;color:#fff}
.brand-tab[data-brand="腾势"].active{background:#1565C0;color:#fff}
.brand-tab[data-brand="方程豹"].active{background:#4CAF50;color:#fff}
.stat-bar{padding:10px 16px;font-size:13px;color:#666;background:#fff;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center}
.loading-dot{display:inline-block;width:6px;height:6px;background:#2E7D32;border-radius:50%;animation:blink 1s infinite;margin-right:4px;vertical-align:middle}
@keyframes blink{50%{opacity:.3}}
.refresh-btn{background:none;border:1px solid #ddd;color:#666;padding:2px 10px;border-radius:10px;font-size:11px;cursor:pointer}
.list-wrap{padding:10px 12px 20px}
.card{background:#fff;border-radius:12px;margin-bottom:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card-hd{display:flex;justify-content:space-between;align-items:center;padding:11px 14px 7px;border-bottom:1px solid #f0f0f0}
.series{font-size:15px;font-weight:700;color:#2E7D32;flex:1}
.brand-tag{font-size:11px;padding:2px 8px;border-radius:10px;color:#fff;font-weight:600;flex-shrink:0;margin-left:8px}
.tag-王朝{background:#E65100}.tag-海洋{background:#0277BD}.tag-腾势{background:#1565C0}.tag-方程豹{background:#4CAF50}
.model{padding:5px 14px 7px;font-size:13px;color:#888;font-weight:500}
.price-row{display:flex;gap:8px;padding:6px 14px 12px;background:#fafafa}
.price-item{flex:1;text-align:center}
.price-label{font-size:11px;color:#999;display:block;margin-bottom:3px}
.price-num{font-size:17px;font-weight:800;display:block}
.price-num.guide{color:#333}
.price-num.gx{color:#E53935}
.price-num.gx.yx{color:#2E7D32}
.yx-badge{display:inline-block;font-size:9px;padding:1px 5px;border-radius:6px;background:#E8F5E9;color:#2E7D32;font-weight:700;margin-left:2px;vertical-align:middle}
.empty-tip{text-align:center;padding:60px 0;color:#bbb;font-size:16px}
.loading-tip{text-align:center;padding:60px 0;color:#999;font-size:15px}
.spinner{display:block;width:30px;height:30px;border:3px solid #eee;border-top-color:#2E7D32;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.footer{text-align:center;padding:20px;font-size:12px;color:#ccc}
</style>
</head>
<body>

<div class="header">
  <h1>🚗 宇翔专用·车价查询</h1>
  <div class="sub">王朝以广宣价为销售价 · 仅展示指导价与广宣价</div>
  <div class="search-bar">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="搜索车系/车型..." oninput="onInput()">
      <div class="clear-btn" id="clearBtn" onclick="clearSearch()">✕</div>
    </div>
    <button class="search-btn" onclick="doSearch()">查询</button>
  </div>
</div>

<div class="brand-tabs">
  <button class="brand-tab active" data-brand="王朝" onclick="selectBrand('王朝')">🏯 王朝</button>
  <button class="brand-tab" data-brand="海洋" onclick="selectBrand('海洋')">🌊 海洋</button>
  <button class="brand-tab" data-brand="腾势" onclick="selectBrand('腾势')">🚙 腾势</button>
  <button class="brand-tab" data-brand="方程豹" onclick="selectBrand('方程豹')">🐆 方程豹</button>
</div>

<div class="stat-bar">
  <span id="statText">正在加载...</span>
  <button class="refresh-btn" onclick="loadCloudData()">🔄 刷新</button>
</div>

<div class="list-wrap" id="listWrap">
  <div class="loading-tip"><div class="spinner"></div>正在从云端加载数据...</div>
</div>

<div class="footer">宇翔专用版 · 仅展示指导价 &amp; 广宣价</div>

var allData = [];

var lastUpdateTime = null;

["汉L EV","四驱激光雷达旗舰型",279800,262800,17000],
["唐L DM","215KM激光雷达旗舰型",229800,211800,18000],
["唐L DM","200KM四驱激光雷达旗舰型",249800,231800,18000],
["唐L DM","无人机玩家版",285800,267800,18000],
["唐L EV","670KM激光雷达尊享型",239800,222800,17000],
["唐L EV","670KM激光雷达旗舰型",259800,242800,17000],

var GX_MAP = {};
for(var i=0;i<GX_DATA.length;i++){
  GX_MAP[GX_DATA[i][0]+'|'+GX_DATA[i][1]]={gxPrice:GX_DATA[i][3]};
}
function getGx(series,model){
  return GX_MAP[series+'|'+model]||null;
}
function fmt(v){
  if(v===null||v===undefined||v==='') return null;
  var n=parseInt(v);
  if(isNaN(n)) return null;
  return '¥'+n.toLocaleString('zh-CN');
}
function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}

function enrich(raw){
  return raw.map(function(item){
    var o=Object.assign({},item);
    var brand=item['品牌']||'';
    var series=(item['车系']||'');
    var model=(item['车型名称']||item['车型']||'');
    o._guide=item['指导价'];
    o._gx=null; o._yx=false;
    if(brand==='王朝'){
      var gx=getGx(series,model);
      if(gx&&gx.gxPrice!==null&&gx.gxPrice!==undefined){o._gx=fmt(gx.gxPrice);o._yx=true;}
    }
    // 其他品牌：从云端销售价取，null则显示暂无
    if(!o._gx){o._gx=fmt(item['销售价'])||'<span style="color:#bbb">暂无</span>';}
    return o;
  });
}

function renderList(list){
  var w=document.getElementById('listWrap');
  if(!list||list.length===0){
    w.innerHTML='<div class="empty-tip">😅 未找到匹配车型</div>';
    return;
  }
  w.innerHTML=list.map(function(item){
    var brand=esc(item['品牌']||'');
    var series=esc(item['车系全名']||item['车系']||'');
    var model=esc(item['车型名称']||item['车型']||'');
    var badge=item._yx?'<span class="yx-badge">广宣价</span>':'';
    var cls=item._yx?'yx':'';
    return '<div class="card">\
<div class="card-hd"><span class="series">'+series+'</span><span class="brand-tag tag-'+brand+'">'+brand+'</span></div>\
<div class="model">'+model+'</div>\
<div class="price-row">\
<div class="price-item"><span class="price-label">指导价</span><span class="price-num guide">'+fmt(item._guide)+'</span></div>\
<div class="price-item"><span class="price-label">广宣价'+badge+'</span><span class="price-num gx '+cls+'">'+item._gx+'</span></div>\
</div>\
</div>';
  }).join('');
}

function selectBrand(brand){
  currentBrand=brand;
  var tabs=document.querySelectorAll('.brand-tab');
  for(var i=0;i<tabs.length;i++) tabs[i].classList.toggle('active',tabs[i].getAttribute('data-brand')===brand);
  document.getElementById('searchInput').value='';
  document.getElementById('clearBtn').style.display='none';
  var base=allData.filter(function(d){return(d['品牌']||'')===currentBrand});
  updateStat(base.length,currentBrand);
  renderList(base);
}

function doSearch(){
  var kw=document.getElementById('searchInput').value.trim();
  document.getElementById('clearBtn').style.display=kw?'flex':'none';
  var base=allData.filter(function(d){return(d['品牌']||'')===currentBrand});
  if(!kw){updateStat(base.length,currentBrand);renderList(base);return;}
  var kws=kw.toLowerCase().split(/\s+/).filter(function(k){return k;});
  var r=base.filter(function(d){
    var t=[d['车系全名']||'',d['车型名称']||'',d['品牌']||'',d['来源']||'',d['车系']||''].join(' ').toLowerCase();
    return kws.every(function(k){return t.indexOf(k)>=0;});
  });
  updateStat(r.length,currentBrand,kw);
  renderList(r);
}
function onInput(){doSearch();}
function clearSearch(){
  document.getElementById('searchInput').value='';
  document.getElementById('clearBtn').style.display='none';
  selectBrand(currentBrand);
}

function updateStat(count,brand,keyword){
  var txt='';
  if(keyword) txt='找到 '+count+' 条';
  else txt=brand+' · '+count+' 条';
  if(lastUpdateTime) txt+=' &nbsp;|&nbsp; '+lastUpdateTime;
  document.getElementById('statText').innerHTML=txt;
}

function loadCloudData(){
  var stat=document.getElementById('statText');
  var wrap=document.getElementById('listWrap');
  stat.innerHTML='<span class="loading-dot"></span>加载中...';
  wrap.innerHTML='<div class="loading-tip"><div class="spinner"></div>正在从云端加载...</div>';
  fetch(DATA_URL,{cache:'no-cache'}).then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
    .then(function(json){
      if(!json||!Array.isArray(json)||json.length===0) throw new Error('数据为空');
      allData=enrich(json);
      var now=new Date();
      lastUpdateTime=(now.getMonth()+1)+'/'+now.getDate()+' '+now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
      selectBrand(currentBrand);
    })
    .catch(function(e){
      stat.innerHTML='⚠️ 加载失败';
      wrap.innerHTML='<div class="empty-tip">😅 加载失败<br><br><button onclick="loadCloudData()" style="padding:8px 24px;background:#2E7D32;color:#fff;border:none;border-radius:20px;font-size:14px;cursor:pointer">重新加载</button></div>';
    });
}

loadCloudData();
setInterval(loadCloudData,30*60*1000);
</script>
</body>
</html>
