<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>🚗 买车补上补 - 直播算价</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;background:#FFF8F0;min-height:100vh;color:#333}

/* ===== 顶部导航栏 ===== */
.top-nav{background:#fff;display:flex;align-items:center;justify-content:space-between;padding:12px 16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.back-btn{font-size:22px;color:#333;background:none;border:none;cursor:pointer;width:36px;height:36px;display:flex;align-items:center;justify-content:center}
.nav-title{font-size:17px;font-weight:700;color:#333;text-align:center;flex:1}
.city-btn{font-size:14px;color:#E65100;font-weight:600;background:none;border:none;cursor:pointer}

/* ===== 车型信息头部 ===== */
.car-header{background:#fff;margin:10px 12px;border-radius:16px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.car-name-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.car-series{font-size:20px;font-weight:700;color:#E65100;flex:1}
.edit-tag{font-size:11px;padding:2px 8px;border-radius:10px;background:#FFF3E0;color:#E65100;font-weight:600;cursor:pointer;border:1px solid #FFE0B2}
.car-model-text{font-size:15px;color:#666;margin-bottom:4px}
.guide-price-row{font-size:15px;color:#666}
.guide-price-val{color:#E65100;font-weight:700;font-size:18px}

/* ===== Tab 切换栏（购新车 / 置换换新） ===== */
.tab-bar{display:flex;background:#fff;margin:10px 12px;border-radius:12px;padding:4px;gap:4px;box-shadow:0 2px 8px rgba(230,81,0,.15);border:1.5px solid #FFE0B2}
.tab-bar.hidden-tab{display:none!important}
.tab-item{flex:1;text-align:center;padding:12px 8px;border-radius:10px;font-size:15px;font-weight:700;color:#999;cursor:pointer;transition:all .2s;border:none;background:none}
.tab-item.active{background:#FFF3E0;color:#E65100}

/* ===== 预计补后价（大字显示） ===== */
.result-box{background:#fff;margin:12px;border-radius:16px;padding:24px 16px;text-align:center;box-shadow:0 2px 12px rgba(230,81,0,.1)}
.result-label{font-size:14px;color:#999;margin-bottom:8px}
.result-price{font-size:42px;font-weight:800;color:#E65100;line-height:1.2}
.result-note{font-size:11px;color:#ccc;margin-top:8px}

/* ===== 价格明细区域 ===== */
.detail-section{background:#fff;margin:0 12px 12px;border-radius:16px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.04)}

.price-detail-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;text-align:center;margin-bottom:16px}
.price-detail-label{font-size:12px;color:#999;margin-bottom:4px}
.price-detail-val{font-size:18px;font-weight:700;color:#333}
.price-detail-val.highlight{color:#E65100}

/* ===== 可编辑行 ===== */
.edit-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid #f5f5f5}
.edit-row:last-child{border-bottom:none}
.edit-left{display:flex;align-items:center;gap:8px}
.edit-title{font-size:15px;font-weight:600;color:#333;cursor:pointer}
.edit-badge{font-size:10px;padding:2px 6px;border-radius:8px;background:#FFF3E0;color:#E65100;font-weight:600;cursor:pointer}
.edit-right{display:flex;align-items:center;gap:8px}
.edit-val{font-size:18px;font-weight:700;color:#E65100;min-width:100px;text-align:right}
.edit-arrow{font-size:14px;color:#ccc}
.edit-calc-hint{font-size:11px;color:#999;margin-top:2px;text-align:right}

/* 权益方案行（不可编辑数值，仅展示） */
.equity-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid #f5f5f5}
.equity-row:last-child{border-bottom:none}
.equity-left{display:flex;align-items:center;gap:8px}
.equity-title{font-size:15px;font-weight:600;color:#333;cursor:pointer}
.equity-badge{font-size:10px;padding:2px 6px;border-radius:8px;background:#E8F5E9;color:#2E7D32;font-weight:600;cursor:pointer}
.equity-right{font-size:18px;font-weight:700;color:#2E7D20;min-width:100px;text-align:right;word-break:break-all}

/* ===== 输入弹窗 - 价格 ===== */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.show{display:flex}
.modal-box{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:500px;padding:24px 20px 34px;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-title{font-size:17px;font-weight:700;text-align:center;margin-bottom:20px;color:#333}
.modal-input-wrap{display:flex;align-items:center;background:#f5f5f5;border-radius:12px;padding:4px 16px;margin-bottom:20px}
.modal-prefix{font-size:20px;font-weight:700;color:#E65100}
.modal-input{flex:1;border:none;background:none;font-size:28px;font-weight:700;color:#333;padding:12px 8px;outline:none;text-align:right}
.modal-input::placeholder{color:#ccc}
.modal-btns{display:flex;gap:12px}
.modal-btn{flex:1;padding:14px;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;border:none}
.modal-btn-cancel{background:#f5f5f5;color:#666}
.modal-btn-confirm{background:linear-gradient(135deg,#FF9800,#E65100);color:#fff;box-shadow:0 4px 12px rgba(230,81,0,.3)}

/* ===== 文字编辑弹窗 ===== */
.text-modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-end;justify-content:center}
.text-modal-overlay.show{display:flex}
.text-modal-box{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:500px;padding:24px 20px 34px;animation:slideUp .25s ease}
.text-modal-title{font-size:17px;font-weight:700;text-align:center;margin-bottom:20px;color:#333}
.text-modal-input{width:100%;border:1px solid #eee;border-radius:12px;padding:12px 16px;font-size:16px;outline:none;margin-bottom:20px}
.text-modal-input:focus{border-color:#E65100}
.text-modal-btns{display:flex;gap:12px}
.text-modal-btn{flex:1;padding:14px;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;border:none}
.text-modal-btn-cancel{background:#f5f5f5;color:#666}
.text-modal-btn-confirm{background:linear-gradient(135deg,#FF9800,#E65100);color:#fff;box-shadow:0 4px 12px rgba(230,81,0,.3)}

/* ===== 底部按钮 ===== */
.bottom-action{margin:12px 20px 30px}
.action-btn{width:100%;padding:16px;border-radius:30px;font-size:17px;font-weight:700;cursor:pointer;border:none;background:linear-gradient(135deg,#FFC107,#FF9800);color:#fff;box-shadow:0 4px 16px rgba(255,152,0,.35);text-align:center}
.action-sub{font-size:12px;color:#FF9800;margin-top:4px;text-align:center}

/* ===== 车型选择列表 ===== */
.car-list-area{padding:10px 12px 20px}
.list-card{background:#fff;border-radius:12px;margin-bottom:10px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,.06);cursor:pointer;transition:all .15s;border:2px solid transparent}
.list-card:active{transform:scale(.98)}
.list-card.selected{border-color:#E65100;background:#FFF8F0}
.lc-name{font-size:15px;font-weight:700;color:#333;margin-bottom:2px}
.lc-model{font-size:13px;color:#888}
.lc-guide{font-size:13px;color:#E65100;font-weight:600;margin-top:4px}
.lc-check{float:right;color:#E65100;font-size:18px;display:none}
.list-card.selected .lc-check{display:inline}

.search-line{display:flex;gap:8px;padding:8px 12px}
.search-input{flex:1;background:#fff;border-radius:20px;padding:0 14px;height:38px;border:1px solid #eee;font-size:14px;outline:none}
.search-input:focus{border-color:#E65100}
.brand-tag{padding:8px 18px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;background:#f5f5f5;color:#666;border:1.5px solid transparent;white-space:nowrap}
.brand-tag.active{background:#FFF3E0;color:#E65100;border-color:#FFE0B2}
.empty-tip{text-align:center;padding:60px 0;color:#bbb;font-size:16px}
.loading-tip{text-align:center;padding:60px 0;color:#999;font-size:15px}
</style>
</head>
<body>

<!-- 顶部导航 -->
<div class="top-nav">
  <button class="back-btn" onclick="showCarList()">←</button>
  <div class="nav-title">买车补上补</div>
  <button class="city-btn" id="cityBtn">佛山 ▼</button>
</div>

<!-- 车型信息头部 -->
<div class="car-header" id="carHeader" style="display:none">
  <div class="car-name-row">
    <span class="car-series" id="dispSeries">海狮05EV</span>
    <span class="edit-tag" onclick="showCarList()">更换 ▸</span>
  </div>
  <div class="car-model-text" id="dispModel">520智航版</div>
  <div class="guide-price-row">指导价 <span class="guide-price-val" id="dispGuide">12.99万</span></div>
</div>

<!-- Tab 切换 -->
<div class="tab-bar hidden-tab" id="tabBar">
  <div class="tab-item active" data-tab="new" onclick="switchTab('new')">
    <div>购新车</div>
  </div>
  <div class="tab-item" data-tab="trade" onclick="switchTab('trade')">
    <div>置换换新</div>
  </div>
</div>

<!-- 预计补后价 -->
<div class="result-box" id="resultBox" style="display:none">
  <div class="result-label">预计补后价(元)</div>
  <div class="result-price" id="finalPrice">101,400</div>
  <div class="result-note">*以上金额是为你匹配到的最佳补贴</div>
</div>

<!-- 价格明细 -->
<div class="detail-section" id="detailSection" style="display:none">

  <!-- 优惠 -->
  <div class="edit-row" onclick="openEdit('discount')">
    <div class="edit-left">
      <span class="edit-title" id="titleDiscount" onclick="event.stopPropagation();openTextEdit('titleDiscount','优惠')">优惠</span>
      <span class="edit-badge" id="badgeDiscount" onclick="event.stopPropagation();openTextEdit('badgeDiscount','买车补上补')">买车补上补</span>
    </div>
    <div class="edit-right">
      <span class="edit-val" id="eDiscount">共补 28,500 元</span>
      <span class="edit-arrow">▸</span>
    </div>
  </div>

  <!-- ZF补贴权益 -->
  <div class="edit-row" onclick="openEdit('platform')">
    <div class="edit-left">
      <span class="edit-title" id="titlePlatform" onclick="event.stopPropagation();openTextEdit('titlePlatform','ZF补贴权益')">ZF补贴权益</span>
      <span class="edit-badge" id="badgePlatform" onclick="event.stopPropagation();openTextEdit('badgePlatform','审核后返现')">审核后返现</span>
    </div>
    <div class="edit-right">
      <span class="edit-val" id="ePlatform">500元 ▸</span>
      <span class="edit-arrow"></span>
    </div>
  </div>

  <!-- 置换残值 -->
  <div class="edit-row" onclick="openEdit('tradein')">
    <div class="edit-left">
      <span class="edit-title" id="titleTradein" onclick="event.stopPropagation();openTextEdit('titleTradein','置换残值')">置换残值</span>
      <span class="edit-badge" id="badgeTradein" onclick="event.stopPropagation();openTextEdit('badgeTradein','旧车估值')">旧车估值</span>
    </div>
    <div class="edit-right">
      <span class="edit-val" id="eTradein">输入残值 ▸</span>
      <div class="edit-calc-hint" id="eTradeinHint">残值输入后自动算补贴</div>
    </div>
  </div>

  <!-- 置换补贴（=残值×8%，单独一行） -->
  <div class="edit-row" style="background:#FFF8E1">
    <div class="edit-left">
      <span class="edit-title" id="titleTradeBonus" onclick="event.stopPropagation();openTextEdit('titleTradeBonus','置换补贴')">置换补贴</span>
      <span class="edit-badge" id="badgeTradeBonus" onclick="event.stopPropagation();openTextEdit('badgeTradeBonus','残值×8%')">残值×8%</span>
    </div>
    <div class="edit-right">
      <span class="edit-val" id="eTradeBonus">—</span>
    </div>
  </div>

  <!-- 至高权益 -->
  <div class="equity-row">
    <div class="equity-left">
      <span class="equity-title" id="titleEquity" onclick="openTextEdit('titleEquity','至高权益')">至高权益</span>
      <span class="equity-badge" id="badgeEquity" onclick="openTextEdit('badgeEquity','赠送')">赠送</span>
    </div>
    <div class="equity-right" id="eEquity" onclick="openTextEdit('eEquity','保养套餐 · 充电桩 · 流量包')">保养套餐 · 充电桩 · 流量包</div>
  </div>

  <!-- 经销商信息 -->
  <div style="margin-top:16px;padding-top:16px;border-top:1px dashed #eee">
    <div style="font-size:14px;color:#333;font-weight:600;margin-bottom:4px">
      <span id="dealerName">比亚迪海洋佛山禅迪店</span>
      <span style="font-size:12px;color:#E65100;font-weight:normal;cursor:pointer" onclick="showCarList()"> 更换 ▸</span>
    </div>
    <div style="font-size:12px;color:#999" id="dealerAddr">6.6km | 佛山市南海区狮山镇罗村大道2号-2之一</div>
  </div>
</div>

<!-- 底部按钮 -->
<div class="bottom-action" id="bottomAction" style="display:none">
  <button class="action-btn" onclick="alert('请联系经销商获取最新报价')">免费领取</button>
  <div class="action-sub" id="actionSub">28500元购车补贴</div>
</div>

<!-- ========== 车型选择视图 ========== -->
<div class="car-list-area" id="carListView">
  <div style="display:flex;gap:6px;padding:8px 0;flex-wrap:wrap" id="brandBar">
    <div class="brand-tag active" data-brand="全部" onclick="filterBrand('全部')">全部</div>
    <div class="brand-tag" data-brand="王朝" onclick="filterBrand('王朝')">王朝</div>
    <div class="brand-tag" data-brand="海洋" onclick="filterBrand('海洋')">海洋</div>
    <div class="brand-tag" data-brand="腾势" onclick="filterBrand('腾势')">腾势</div>
  </div>
  <div class="search-line">
    <input type="text" class="search-input" id="listSearch" placeholder="搜索车系/车型..." oninput="filterCarList()">
  </div>
  <div id="carListContent"><div class="loading-tip">加载中...</div></div>
</div>

<!-- ========== 价格编辑弹窗 ========== -->
<div class="modal-overlay" id="editModal">
  <div class="modal-box">
    <div class="modal-title" id="modalTitle">编辑价格</div>
    <div class="modal-input-wrap">
      <span class="modal-prefix">¥</span>
      <input type="number" class="modal-input" id="modalInput" placeholder="输入金额" inputmode="numeric">
    </div>
    <div class="modal-btns">
      <button class="modal-btn modal-btn-cancel" onclick="closeEdit()">取消</button>
      <button class="modal-btn modal-btn-confirm" onclick="confirmEdit()">确定</button>
    </div>
  </div>
</div>

<!-- ========== 文字编辑弹窗 ========== -->
<div class="text-modal-overlay" id="textModal">
  <div class="text-modal-box">
    <div class="text-modal-title" id="textModalTitle">编辑文字</div>
    <input type="text" class="text-modal-input" id="textInput" placeholder="输入新文字">
    <div class="text-modal-btns">
      <button class="text-modal-btn text-modal-btn-cancel" onclick="closeTextEdit()">取消</button>
      <button class="text-modal-btn text-modal-btn-confirm" onclick="confirmTextEdit()">确定</button>
    </div>
  </div>
</div>

<script>
// ============================================================
//  数据源
// ============================================================
var DATA_URL = 'https://gist.githubusercontent.com/baolongjie/62c26b6e487aebc34611599dc740edfd/raw/car_data_v37.json';
var allCars = [];
var currentCar = null;

// ============================================================
//  可编辑价格字段
// ============================================================
var prices = {
  guide: 129900,
  platform: 0,
  discount: 0,
  tradein: 0
};

var currentTab = 'new';
var currentBrand = '全部';

// ============================================================
//  工具函数
// ============================================================

/**
 * 格式化数字（带逗号）
 */
function fmtNum(n){
  if(n===null||n===undefined||isNaN(n))return '0';
  return n.toLocaleString('zh-CN');
}

/**
 * 模糊后四位（仅用于预计补后价）
 * 例如：101400 → "10****"
 */
function fmtNumBlur(n){
  if(n===null||n===undefined||isNaN(n))return '0';
  var s = n.toLocaleString('zh-CN');
  var len = s.replace(/,/g,'').length;
  if(len <= 4) return '*'.repeat(len);
  var visible = s.length - 4;
  return s.substring(0, visible) + '****';
}

function fmtWan(n){
  if(n===null||n===undefined||isNaN(n))return '-';
  var w = (n / 10000).toFixed(2);
  w = parseFloat(w).toString();
  return w + '万';
}

function esc(s){
  var d=document.createElement('div');
  d.textContent=s||'';
  return d.innerHTML;
}

// ============================================================
//  计算最终价格 & 刷新显示
//  补后价 = 指导价 - 平台补贴 - 商家优惠 - 国补
//  （新车优惠、置换补贴、权益方案不参与计算）
// ============================================================
function calcAndRender(){
  // 置换补贴 = 残值 × 8%
  var tradeinBonus = Math.round(prices.tradein * 0.08);
  
  // 补后价 = 指导价 - 优惠 - ZF补贴权益 - 置换补贴
  var final = prices.guide - prices.discount - prices.platform - tradeinBonus;
  document.getElementById('finalPrice').textContent = fmtNumBlur(final);

  // 编辑行显示值
  document.getElementById('eDiscount').textContent = '共补 ' + fmtNum(prices.discount) + ' 元';
  document.getElementById('ePlatform').textContent = fmtNum(prices.platform) + '元 ▸';
  
  // 置换残值显示（纯金额）
  if(prices.tradein > 0){
    document.getElementById('eTradein').textContent = fmtNum(prices.tradein) + '元 ▸';
  } else {
    document.getElementById('eTradein').textContent = '输入残值 ▸';
  }
  
  // 置换补贴显示（残值×8%）
  if(prices.tradein > 0){
    document.getElementById('eTradeBonus').textContent = fmtNum(tradeinBonus) + '元';
  } else {
    document.getElementById('eTradeBonus').textContent = '—';
  }

  document.getElementById('actionSub').textContent = fmtNum(prices.discount) + '元购车补贴';
}

// ============================================================
//  Tab 切换
// ============================================================
function switchTab(tab){
  currentTab = tab;
  var tabs = document.querySelectorAll('.tab-item');
  for(var i=0;i<tabs.length;i++){
    tabs[i].classList.toggle('active', tabs[i].getAttribute('data-tab') === tab);
  }
  calcAndRender();
}

// ============================================================
//  价格编辑弹窗
// ============================================================
var editingField = null;

function openEdit(field){
  editingField = field;
  var titles = {
    discount:'优惠',
    platform:'ZF补贴权益',
    tradein:'置换残值（将自动×8%加到补贴）'
  };
  document.getElementById('modalTitle').textContent = titles[field] || '编辑价格';
  var showVal = prices[field];
  document.getElementById('modalInput').value = showVal || '';
  document.getElementById('editModal').classList.add('show');
  setTimeout(function(){document.getElementById('modalInput').focus()}, 300);
}

function closeEdit(){
  document.getElementById('editModal').classList.remove('show');
  editingField = null;
}

function confirmEdit(){
  var val = parseInt(document.getElementById('modalInput').value);
  if(isNaN(val) || val < 0){
    alert('请输入有效金额');
    return;
  }
  if(editingField){
    prices[editingField] = val;
    calcAndRender();
  }
  closeEdit();
}

document.getElementById('editModal').addEventListener('click', function(e){
  if(e.target === this) closeEdit();
});

// ============================================================
//  文字编辑弹窗（点击标题/角标/权益内容可自定义文字）
// ============================================================
var textEditingEl = null;

function openTextEdit(elId, currentText){
  textEditingEl = elId;
  var el = document.getElementById(elId);
  document.getElementById('textModalTitle').textContent = '编辑文字';
  document.getElementById('textInput').value = el.textContent || currentText || '';
  document.getElementById('textModal').classList.add('show');
  setTimeout(function(){document.getElementById('textInput').focus();document.getElementById('textInput').select()}, 300);
}

function closeTextEdit(){
  document.getElementById('textModal').classList.remove('show');
  textEditingEl = null;
}

function confirmTextEdit(){
  var val = (document.getElementById('textInput').value || '').trim();
  if(!val){ alert('文字不能为空'); return; }
  if(textEditingEl){
    document.getElementById(textEditingEl).textContent = val;
  }
  closeTextEdit();
}

document.getElementById('textModal').addEventListener('click', function(e){
  if(e.target === this) closeTextEdit();
});

// ============================================================
//  选择车型
// ============================================================
function selectCar(car){
  currentCar = car;
  prices.guide = parseInt(car['指导价']) || 0;
  prices.discount = 0;  // 初始不读取优惠价
  prices.platform = 0;
  prices.tradein = 0;

  document.getElementById('dispSeries').textContent = car['车系全名'] || car['车系'] || '';
  document.getElementById('dispModel').textContent = car['车型名称'] || '';
  document.getElementById('dispGuide').textContent = fmtWan(prices.guide);
  document.getElementById('carHeader').style.display = 'block';

  document.getElementById('dealerName').textContent = car['来源'] || '比亚迪4S店';
  document.getElementById('dealerAddr').textContent = car['备注'] || '';

  document.getElementById('carListView').style.display = 'none';
  var tb = document.getElementById('tabBar');
  tb.style.display = '';
  tb.classList.remove('hidden-tab');
  document.getElementById('resultBox').style.display = 'block';
  document.getElementById('detailSection').style.display = 'block';
  document.getElementById('bottomAction').style.display = 'block';

  calcAndRender();
}

// ============================================================
//  车型列表
// ============================================================
function showCarList(){
  document.getElementById('carListView').style.display = 'block';
  document.getElementById('carHeader').style.display = 'none';
  var tb = document.getElementById('tabBar');
  tb.classList.add('hidden-tab');
  document.getElementById('resultBox').style.display = 'none';
  document.getElementById('detailSection').style.display = 'none';
  document.getElementById('bottomAction').style.display = 'none';
  renderCarList(getFilteredCars());
}

function renderCarList(list){
  var w = document.getElementById('carListContent');
  if(!w){
    w = document.getElementById('carListView');
  }
  if(!list || list.length === 0){
    w.innerHTML = '<div class="empty-tip">😅 未找到匹配车型</div>';
    return;
  }
  w.innerHTML = list.map(function(item, idx){
    var selected = currentCar && item['车型名称'] === currentCar['车型名称'];
    return '<div class="list-card '+(selected?'selected':'')+'" onclick="selectCarByIndex('+idx+')">'
      + '<span class="lc-check">✓</span>'
      + '<div class="lc-name">'+esc(item['车系全名']||item['车系']||'')+'</div>'
      + '<div class="lc-model">'+esc(item['车型名称']||'')+'</div>'
      + '<div class="lc-guide">指导价 '+fmtPrice(item['指导价'])+'</div>'
      + '</div>';
  }).join('');
}

function selectCarByIndex(idx){
  var list = getFilteredCars();
  if(list[idx]) selectCar(list[idx]);
}

function filterBrand(brand){
  currentBrand = brand;
  var tags = document.querySelectorAll('.brand-tag');
  for(var i=0;i<tags.length;i++){
    tags[i].classList.toggle('active', tags[i].getAttribute('data-brand') === brand);
  }
  renderCarList(getFilteredCars());
}

function getFilteredCars(){
  var list = allCars;
  if(currentBrand !== '全部'){
    list = list.filter(function(item){ return (item['品牌']||'') === currentBrand; });
  }
  var kw = (document.getElementById('listSearch').value || '').trim().toLowerCase();
  if(kw){
    list = list.filter(function(item){
      var t = [item['车系全名']||'', item['车型名称']||'', item['品牌']||'', item['车系']||''].join(' ').toLowerCase();
      return t.indexOf(kw) >= 0;
    });
  }
  return list;
}

function filterCarList(){
  renderCarList(getFilteredCars());
}

function fmtPrice(v){
  if(v===null||v===undefined||v===''||v===false)return '-';
  var n=parseInt(v);
  if(isNaN(n))return v;
  return '¥'+n.toLocaleString('zh-CN');
}

// ============================================================
//  加载数据
// ============================================================
function loadCloudData(){
  fetch(DATA_URL, {cache:'no-cache'})
    .then(function(res){ if(!res.ok) throw new Error('HTTP '+res.status); return res.json(); })
    .then(function(json){
      if(!json || !Array.isArray(json) || json.length === 0) throw new Error('数据为空');
      allCars = json.filter(function(item){ return (item['品牌']||'') !== '方程豹'; });
      renderCarList(allCars);
      showCarList();
    })
    .catch(function(err){
      console.error('[加载失败]', err);
      var lv = document.getElementById('carListView');
      lv.innerHTML = '<div class="empty-tip">😅 数据加载失败<br><br><span style="font-size:13px;color:#999">'+esc(err.message)+'</span><br><br>'
        +'<button onclick="loadCloudData()" style="padding:8px 24px;background:#E65100;color:#fff;border:none;border-radius:20px;font-size:14px;cursor:pointer">重新加载</button></div>';
    });
}

// ============================================================
//  初始化
// ============================================================
loadCloudData();
calcAndRender();
</script>
</body>
</html>
