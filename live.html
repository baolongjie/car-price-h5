<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>🚗 买车补上补 - 直播算价</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;background:#FFF8F0;min-height:100vh;color:#333}

/* ===== 顶部导航栏 ===== */
.top-nav{background:#fff;display:flex;align-items:center;justify-content:space-between;padding:12px 16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.back-btn{font-size:22px;color:#333;background:none;border:none;cursor:pointer;width:36px;height:36px;display:flex;align-items:center;justify-content:center}
.nav-title{font-size:17px;font-weight:700;color:#333;text-align:center;flex:1}
.city-btn{font-size:14px;color:#E65100;font-weight:600;background:none;border:none;cursor:pointer}

/* ===== 车型信息头部 ===== */
.car-header{background:#fff;margin:10px 12px;border-radius:16px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.car-name-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.car-series{font-size:20px;font-weight:700;color:#E65100;flex:1}
.edit-tag{font-size:11px;padding:2px 8px;border-radius:10px;background:#FFF3E0;color:#E65100;font-weight:600;cursor:pointer;border:1px solid #FFE0B2}
.car-model-text{font-size:15px;color:#666;margin-bottom:4px}
.guide-price-row{font-size:15px;color:#666}
.guide-price-val{color:#E65100;font-weight:700;font-size:18px}

/* ===== Tab 切换栏 ===== */
.tab-bar{display:flex;background:#fff;margin:0 12px;border-radius:12px;padding:4px;gap:4px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.tab-item{flex:1;text-align:center;padding:10px 8px;border-radius:10px;font-size:13px;font-weight:600;color:#999;cursor:pointer;transition:all .2s;border:none;background:none}
.tab-item.active{background:#FFF3E0;color:#E65100}
.tab-sub{font-size:11px;color:#bbb;margin-top:2px;font-weight:400}

/* ===== 预计补后价（大字显示） ===== */
.result-box{background:#fff;margin:12px;border-radius:16px;padding:24px 16px;text-align:center;box-shadow:0 2px 12px rgba(230,81,0,.1)}
.result-label{font-size:14px;color:#999;margin-bottom:8px}
.result-price{font-size:42px;font-weight:800;color:#E65100;line-height:1.2}
.result-note{font-size:11px;color:#ccc;margin-top:8px}

/* ===== 价格明细区域 ===== */
.detail-section{background:#fff;margin:0 12px 12px;border-radius:16px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.04)}

.price-detail-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;text-align:center;margin-bottom:16px}
.price-detail-item{}
.price-detail-label{font-size:12px;color:#999;margin-bottom:4px}
.price-detail-val{font-size:18px;font-weight:700;color:#333}
.price-detail-val.highlight{color:#E65100}

/* ===== 可编辑价格行 ===== */
.edit-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid #f5f5f5}
.edit-row:last-child{border-bottom:none}
.edit-left{display:flex;align-items:center;gap:8px}
.edit-title{font-size:15px;font-weight:600;color:#333}
.edit-badge{font-size:10px;padding:2px 6px;border-radius:8px;background:#FFF3E0;color:#E65100;font-weight:600}
.edit-right{display:flex;align-items:center;gap:8px}
.edit-val{font-size:18px;font-weight:700;color:#E65100;min-width:100px;text-align:right}
.edit-arrow{font-size:14px;color:#ccc}

/* ===== 输入弹窗 ===== */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.show{display:flex}
.modal-box{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:500px;padding:24px 20px 34px;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-title{font-size:17px;font-weight:700;text-align:center;margin-bottom:20px;color:#333}
.modal-input-wrap{display:flex;align-items:center;background:#f5f5f5;border-radius:12px;padding:4px 16px;margin-bottom:20px}
.modal-prefix{font-size:20px;font-weight:700;color:#E65100}
.modal-input{flex:1;border:none;background:none;font-size:28px;font-weight:700;color:#333;padding:12px 8px;outline:none;text-align:right}
.modal-input::placeholder{color:#ccc}
.modal-btns{display:flex;gap:12px}
.modal-btn{flex:1;padding:14px;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;border:none}
.modal-btn-cancel{background:#f5f5f5;color:#666}
.modal-btn-confirm{background:linear-gradient(135deg,#FF9800,#E65100);color:#fff;box-shadow:0 4px 12px rgba(230,81,0,.3)}

/* ===== 底部按钮 ===== */
.bottom-action{margin:12px 20px 30px}
.action-btn{width:100%;padding:16px;border-radius:30px;font-size:17px;font-weight:700;cursor:pointer;border:none;background:linear-gradient(135deg,#FFC107,#FF9800);color:#fff;box-shadow:0 4px 16px rgba(255,152,0,.35);text-align:center}
.action-sub{font-size:12px;color:#FF9800;margin-top:4px;text-align:center}

/* ===== 车型选择列表 ===== */
.car-list-area{padding:10px 12px 20px}
.list-card{background:#fff;border-radius:12px;margin-bottom:10px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,.06);cursor:pointer;transition:all .15s;border:2px solid transparent}
.list-card:active{transform:scale(.98)}
.list-card.selected{border-color:#E65100;background:#FFF8F0}
.list-card .lc-name{font-size:15px;font-weight:700;color:#333;margin-bottom:2px}
.list-card .lc-model{font-size:13px;color:#888}
.list-card .lc-guide{font-size:13px;color:#E65100;font-weight:600;margin-top:4px}
.list-card .lc-check{float:right;color:#E65100;font-size:18px;display:none}
.list-card.selected .lc-check{display:inline}

/* ===== 搜索栏 ===== */
.search-line{display:flex;gap:8px;padding:8px 12px}
.search-input{flex:1;background:#fff;border-radius:20px;padding:0 14px;height:38px;border:1px solid #eee;font-size:14px;outline:none}
.search-input:focus{border-color:#E65100}

/* ===== 空状态 ===== */
.empty-tip{text-align:center;padding:60px 0;color:#bbb;font-size:16px}
.loading-tip{text-align:center;padding:60px 0;color:#999;font-size:15px}
</style>
</head>
<body>

<!-- 顶部导航 -->
<div class="top-nav">
  <button class="back-btn" onclick="showCarList()">←</button>
  <div class="nav-title">买车补上补</div>
  <button class="city-btn" id="cityBtn">佛山 ▼</button>
</div>

<!-- 车型信息头部（选中车型后显示） -->
<div class="car-header" id="carHeader" style="display:none">
  <div class="car-name-row">
    <span class="car-series" id="dispSeries">海狮05EV</span>
    <span class="edit-tag" onclick="showCarList()">更换 ▸</span>
  </div>
  <div class="car-model-text" id="dispModel">520智航版</div>
  <div class="guide-price-row">指导价 <span class="guide-price-val" id="dispGuide">12.99万</span></div>
</div>

<!-- Tab 切换 -->
<div class="tab-bar" id="tabBar">
  <div class="tab-item active" data-tab="new" onclick="switchTab('new')">
    <div>购新车</div>
    <div class="tab-sub" id="tabNewSub">至高补贴28500元</div>
  </div>
  <div class="tab-item" data-tab="trade" onclick="switchTab('trade')">
    <div>置换购新</div>
    <div class="tab-sub" id="tabTradeSub">至高补贴28500元</div>
  </div>
  <div class="tab-item" data-tab="scrap" onclick="switchTab('scrap')">
    <div>报废换新</div>
    <div class="tab-sub" id="tabScrapSub">至高补贴44088元</div>
  </div>
</div>

<!-- 预计补后价 -->
<div class="result-box">
  <div class="result-label">预计补后价(元)</div>
  <div class="result-price" id="finalPrice">101,400</div>
  <div class="result-note">*以上金额是懂车帝为你匹配到的最佳补贴</div>
</div>

<!-- 价格明细 -->
<div class="detail-section">
  <div class="price-detail-grid">
    <div class="price-detail-item">
      <div class="price-detail-label">新车指导价</div>
      <div class="price-detail-val" id="dGuide">129,900</div>
    </div>
    <div class="price-detail-item">
      <div class="price-detail-label">平台补贴</div>
      <div class="price-detail-val highlight" id="dPlatform">500</div>
    </div>
    <div class="price-detail-item">
      <div class="price-detail-label">商家优惠</div>
      <div class="price-detail-val highlight" id="dDealer">28,000</div>
    </div>
  </div>

  <!-- 可编辑行 -->
  <div class="edit-row" onclick="openEdit('discount')">
    <div class="edit-left">
      <span class="edit-title">新车优惠</span>
      <span class="edit-badge">买车补上补</span>
    </div>
    <div class="edit-right">
      <span class="edit-val" id="eDiscount">共补 28,500 元</span>
      <span class="edit-arrow">▸</span>
    </div>
  </div>

  <div class="edit-row" onclick="openEdit('platform')">
    <div class="edit-left">
      <span class="edit-title">平台补贴</span>
      <span class="edit-badge">审核后返现</span>
    </div>
    <div class="edit-right">
      <span class="edit-val" id="ePlatform">500元 ▸</span>
      <span class="edit-arrow"></span>
    </div>
  </div>

  <div class="edit-row" onclick="openEdit('dealer')">
    <div class="edit-left">
      <span class="edit-title">商家优惠</span>
      <span class="edit-badge">车价直减</span>
    </div>
    <div class="edit-right">
      <span class="edit-val" id="eDealer">28000元 ▸</span>
      <span class="edit-arrow"></span>
    </div>
  </div>

  <!-- 经销商信息 -->
  <div style="margin-top:16px;padding-top:16px;border-top:1px dashed #eee">
    <div style="font-size:14px;color:#333;font-weight:600;margin-bottom:4px">
      <span id="dealerName">比亚迪海洋佛山禅迪店</span>
      <span style="font-size:12px;color:#E65100;font-weight:normal;cursor:pointer" onclick="showCarList()"> 更换 ▸</span>
    </div>
    <div style="font-size:12px;color:#999" id="dealerAddr">6.6km | 佛山市南海区狮山镇罗村大道2号-2之一</div>
  </div>
</div>

<!-- 底部按钮 -->
<div class="bottom-action">
  <button class="action-btn" onclick="alert('请联系经销商获取最新报价')">免费领取</button>
  <div class="action-sub" id="actionSub">28500元购车补贴</div>
</div>

<!-- ========== 车型选择视图 ========== -->
<div class="car-list-area" id="carListView" style="display:none">
  <div class="search-line">
    <input type="text" class="search-input" id="listSearch" placeholder="搜索车系/车型..." oninput="filterCarList()">
  </div>
  <div id="carListContent"><div class="loading-tip">加载中...</div></div>
</div>

<!-- ========== 编辑弹窗 ========== -->
<div class="modal-overlay" id="editModal">
  <div class="modal-box">
    <div class="modal-title" id="modalTitle">编辑价格</div>
    <div class="modal-input-wrap">
      <span class="modal-prefix">¥</span>
      <input type="number" class="modal-input" id="modalInput" placeholder="输入金额" inputmode="numeric">
    </div>
    <div class="modal-btns">
      <button class="modal-btn modal-btn-cancel" onclick="closeEdit()">取消</button>
      <button class="modal-btn modal-btn-confirm" onclick="confirmEdit()">确定</button>
    </div>
  </div>
</div>

<script>
// ============================================================
//  数据源
// ============================================================
var DATA_URL = 'https://gist.githubusercontent.com/baolongjie/62c26b6e487aebc34611599dc740edfd/raw/car_data_v37.json';
var allCars = [];
var currentCar = null; // 当前选中的车型

// ============================================================
//  当前可编辑的价格字段
// ============================================================
var prices = {
  guide: 129900,       // 指导价（分）
  platform: 500,        // 平台补贴
  dealer: 28000,        // 商家优惠
  discount: 28500       // 新车优惠（备案优惠+超级置换等）
};

// 当前激活的 tab
var currentTab = 'new';

// ============================================================
//  工具函数
// ============================================================
function fmtNum(n){
  if(n===null||n===undefined||isNaN(n))return '0';
  return n.toLocaleString('zh-CN');
}

function fmtWan(n){
  if(n===null||n===undefined||isNaN(n))return '-';
  var w = (n / 10000).toFixed(2);
  // 去掉末尾无意义的0
  w = parseFloat(w).toString();
  return w + '万';
}

function esc(s){
  var d=document.createElement('div');
  d.textContent=s||'';
  return d.innerHTML;
}

// ============================================================
//  计算最终价格 & 刷新显示
// ============================================================
function calcAndRender(){
  var final = prices.guide - prices.platform - prices.dealer;
  document.getElementById('finalPrice').textContent = fmtNum(final);
  
  // 明细区
  document.getElementById('dGuide').textContent = fmtNum(prices.guide);
  document.getElementById('dPlatform').textContent = fmtNum(prices.platform);
  document.getElementById('dDealer').textContent = fmtNum(prices.dealer);
  
  // 编辑行
  document.getElementById('eDiscount').textContent = '共补 ' + fmtNum(prices.discount) + ' 元';
  document.getElementById('ePlatform').textContent = fmtNum(prices.platform) + '元 ▸';
  document.getElementById('eDealer').textContent = fmtNum(prices.dealer) + '元 ▸';
  
  // Tab 副标题
  document.getElementById('tabNewSub').textContent = '至高补贴' + fmtNum(prices.discount) + '元';
  document.getElementById('tabTradeSub').textContent = '至高补贴' + fmtNum(prices.discount) + '元';
  document.getElementById('tabScrapSub').textContent = '至高补贴' + fmtNum(prices.discount + prices.platform) + '元';
  
  // 底部按钮副标题
  document.getElementById('actionSub').textContent = fmtNum(prices.discount) + '元购车补贴';
}

// ============================================================
//  Tab 切换
// ============================================================
function switchTab(tab){
  currentTab = tab;
  var tabs = document.querySelectorAll('.tab-item');
  for(var i=0;i<tabs.length;i++){
    tabs[i].classList.toggle('active', tabs[i].getAttribute('data-tab') === tab);
  }
  calcAndRender();
}

// ============================================================
//  编辑弹窗
// ============================================================
var editingField = null;

function openEdit(field){
  editingField = field;
  var titles = {discount:'新车优惠（备案优惠+超级置换等）', platform:'平台补贴', dealer:'商家优惠（车价直减）'};
  document.getElementById('modalTitle').textContent = titles[field] || '编辑价格';
  document.getElementById('modalInput').value = prices[field] || '';
  document.getElementById('editModal').classList.add('show');
  setTimeout(function(){document.getElementById('modalInput').focus()}, 300);
}

function closeEdit(){
  document.getElementById('editModal').classList.remove('show');
  editingField = null;
}

function confirmEdit(){
  var val = parseInt(document.getElementById('modalInput').value);
  if(isNaN(val) || val < 0){
    alert('请输入有效金额');
    return;
  }
  if(editingField){
    prices[editingField] = val;
    calcAndRender();
  }
  closeEdit();
}

// 点击遮罩关闭
document.getElementById('editModal').addEventListener('click', function(e){
  if(e.target === this) closeEdit();
});

// ============================================================
//  选择车型
// ============================================================
function selectCar(car){
  currentCar = car;
  prices.guide = parseInt(car['指导价']) || 0;
  
  // 从数据中读取优惠
  var d = parseInt(car['备案优惠(不含超级置换)']) || 0;
  var s = parseInt(car['超级置换']) || 0;
  prices.discount = d + s;
  prices.dealer = d;  // 商家优惠默认用备案优惠
  
  // 显示车型信息
  document.getElementById('dispSeries').textContent = car['车系全名'] || car['车系'] || '';
  document.getElementById('dispModel').textContent = car['车型名称'] || '';
  document.getElementById('dispGuide').textContent = fmtWan(prices.guide);
  document.getElementById('carHeader').style.display = 'block';
  
  // 经销商信息
  document.getElementById('dealerName').textContent = car['来源'] || '比亚迪4S店';
  document.getElementById('dealerAddr').textContent = car['备注'] || '';
  
  // 隐藏列表，显示详情
  document.getElementById('carListView').style.display = 'none';
  document.getElementById('tabBar').style.display = 'flex';
  document.querySelector('.result-box').style.display = 'block';
  document.querySelector('.detail-section').style.display = 'block';
  document.querySelector('.bottom-action').style.display = 'block';
  
  calcAndRender();
}

// ============================================================
//  车型列表
// ============================================================
function showCarList(){
  document.getElementById('carListView').style.display = 'block';
  document.getElementById('carHeader').style.display = 'none';
  document.getElementById('tabBar').style.display = 'none';
  document.querySelector('.result-box').style.display = 'none';
  document.querySelector('.detail-section').style.display = 'none';
  document.querySelector('.bottom-action').style.display = 'none';
  renderCarList(allCars);
}

function renderCarList(list){
  var w = document.getElementById('carListContent');
  if(!list || list.length === 0){
    w.innerHTML = '<div class="empty-tip">😅 未找到匹配车型</div>';
    return;
  }
  w.innerHTML = list.map(function(item, idx){
    var selected = currentCar && item['车型名称'] === currentCar['车型名称'];
    return '<div class="list-card '+(selected?'selected':'')+'" onclick="selectCarByIndex('+idx+')">'
      + '<span class="lc-check">✓</span>'
      + '<div class="lc-name">'+esc(item['车系全名']||item['车系']||'')+'</div>'
      + '<div class="lc-model">'+esc(item['车型名称']||'')+'</div>'
      + '<div class="lc-guide">指导价 '+fmtPrice(item['指导价'])+'</div>'
      + '</div>';
  }).join('');
}

function selectCarByIndex(idx){
  // 先按搜索过滤，再选
  var kw = (document.getElementById('listSearch').value || '').trim().toLowerCase();
  var list = allCars;
  if(kw){
    list = list.filter(function(item){
      var t = [item['车系全名']||'', item['车型名称']||'', item['品牌']||'', item['车系']||''].join(' ').toLowerCase();
      return t.indexOf(kw) >= 0;
    });
  }
  if(list[idx]) selectCar(list[idx]);
}

function filterCarList(){
  var kw = (document.getElementById('listSearch').value || '').trim().toLowerCase();
  if(!kw){ renderCarList(allCars); return; }
  var filtered = allCars.filter(function(item){
    var t = [item['车系全名']||'', item['车型名称']||'', item['品牌']||'', item['车系']||''].join(' ').toLowerCase();
    return t.indexOf(kw) >= 0;
  });
  renderCarList(filtered);
}

function fmtPrice(v){
  if(v===null||v===undefined||v===''||v===false)return '-';
  var n=parseInt(v);
  if(isNaN(n))return v;
  return '¥'+n.toLocaleString('zh-CN');
}

// ============================================================
//  加载数据
// ============================================================
function loadCloudData(){
  fetch(DATA_URL, {cache:'no-cache'})
    .then(function(res){ if(!res.ok) throw new Error('HTTP '+res.status); return res.json(); })
    .then(function(json){
      if(!json || !Array.isArray(json) || json.length === 0) throw new Error('数据为空');
      allCars = json;
      renderCarList(allCars);
      
      // 默认隐藏详情，显示列表
      showCarList();
    })
    .catch(function(err){
      console.error('[加载失败]', err);
      document.getElementById('carListContent').innerHTML =
        '<div class="empty-tip">😅 数据加载失败<br><br><span style="font-size:13px;color:#999">'+esc(err.message)+'</span><br><br>'
        +'<button onclick="loadCloudData()" style="padding:8px 24px;background:#E65100;color:#fff;border:none;border-radius:20px;font-size:14px;cursor:pointer">重新加载</button></div>';
    });
}

// ============================================================
//  初始化
// ============================================================
loadCloudData();
calcAndRender();
</script>
</body>
</html>
